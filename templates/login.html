{{define "title"}}Log in — {{siteName}}{{end}}
{{define "content"}}
<div class="container" style="max-width:440px;padding:2.5rem 1rem 4rem">
  <h1 style="font-size:1.6rem;font-weight:800;margin-bottom:1.25rem">Log in</h1>
  {{if .Flash}}<div class="flash" style="margin-bottom:1rem;padding:.6rem .8rem;border-radius:6px;background:#fef3c7;color:#92400e">{{.Flash}}</div>{{end}}
  <form method="post" action="/login" style="display:flex;flex-direction:column;gap:1rem">
    <label style="display:flex;flex-direction:column;gap:.3rem;font-size:.9rem">
      Username
      <input name="username" type="text" required autocomplete="username"
        style="padding:.55rem .7rem;border:1px solid var(--border);border-radius:6px;background:var(--bg);color:inherit">
    </label>
    <label style="display:flex;flex-direction:column;gap:.3rem;font-size:.9rem">
      Password
      <input name="password" type="password" required autocomplete="current-password"
        style="padding:.55rem .7rem;border:1px solid var(--border);border-radius:6px;background:var(--bg);color:inherit">
    </label>
    <button type="submit" class="btn btn-primary" style="padding:.6rem;border-radius:6px;border:none;background:#1e3a5f;color:#fff;font-weight:600;cursor:pointer">Log in</button>
  </form>
  <p style="margin-top:1.25rem;font-size:.9rem;opacity:.8">Need an account? <a href="/register">Register</a>.</p>
</div>
{{end}}
