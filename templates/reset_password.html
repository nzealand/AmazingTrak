{{define "title"}}Choose a new password — {{siteName}}{{end}}
{{define "content"}}
<div class="container" style="max-width:440px;padding:2.5rem 1rem 4rem">
  <h1 style="font-size:1.6rem;font-weight:800;margin-bottom:1rem">Choose a new password</h1>
  {{if .Flash}}<div class="flash" style="margin-bottom:1rem;padding:.6rem .8rem;border-radius:6px;background:#fef3c7;color:#92400e">{{.Flash}}</div>{{end}}
  <form method="post" action="/reset-password" style="display:flex;flex-direction:column;gap:1rem">
    <input type="hidden" name="token" value="{{.Data.Token}}">
    <label style="display:flex;flex-direction:column;gap:.3rem;font-size:.9rem">
      New password
      <input name="password" type="password" required minlength="8" maxlength="72" autocomplete="new-password" placeholder="8–72 characters"
        style="padding:.55rem .7rem;border:1px solid var(--border);border-radius:6px;background:var(--bg);color:inherit">
    </label>
    <label style="display:flex;flex-direction:column;gap:.3rem;font-size:.9rem">
      Confirm new password
      <input name="confirm_password" type="password" required minlength="8" maxlength="72" autocomplete="new-password"
        style="padding:.55rem .7rem;border:1px solid var(--border);border-radius:6px;background:var(--bg);color:inherit">
    </label>
    <button type="submit" class="btn btn-primary" style="padding:.6rem;border-radius:6px;border:none;background:#1e3a5f;color:#fff;font-weight:600;cursor:pointer">Set new password</button>
  </form>
</div>
{{end}}
